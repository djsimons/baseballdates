<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Older Than? — MLB Age Comparisons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #3a6b35;
    --green-light: #5a9c52;
    --green-pale: #1e3d1a;
    --dirt: #c4925a;
    --dirt-pale: #7a5530;
    --cream: #f0ead6;
    --cream-dim: #b8b09a;
    --bg: #0e1209;
    --bg2: #161c10;
    --bg3: #1e2717;
    --border: rgba(90,156,82,0.18);
    --border2: rgba(90,156,82,0.35);
    --text: #e8e2d0;
    --text-dim: #8a8472;
    --older: #c4925a;
    --younger: #5a9c52;
    --same: #6b7f8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle diamond pattern bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(58,107,53,0.04) 40px,
      rgba(58,107,53,0.04) 41px
    ),
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(58,107,53,0.04) 40px,
      rgba(58,107,53,0.04) 41px
    );
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 0 2rem;
    text-align: center;
  }

  .site-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--green-light);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .site-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 10vw, 6.5rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  .site-title span {
    color: var(--green-light);
  }

  .site-sub {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  /* INPUT SECTION */
  .input-section {
    padding: 3rem 0 2rem;
    text-align: center;
  }

  .dob-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 1rem;
    display: block;
  }

  .dob-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .dob-input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.25rem;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--cream);
    padding: 0.65rem 1rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .dob-input:focus { border-color: var(--green-light); }
  .dob-input::placeholder { color: var(--text-dim); }

  .btn-compare {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem;
    letter-spacing: 0.08em;
    background: var(--green);
    color: var(--cream);
    border: none;
    padding: 0.65rem 1.75rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-compare:hover { background: var(--green-light); }
  .btn-compare:active { transform: scale(0.98); }

  .age-display {
    margin-top: 1.25rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 1.4em;
  }
  .age-display strong { color: var(--cream); font-weight: 500; }

  /* FILTERS */
  .filters {
    display: none;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin: 1rem 0 0;
  }
  .filters.visible { display: flex; }

  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.35rem 0.75rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--green-pale); border-color: var(--green-light); color: var(--green-light); }

  .relation-toggle {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 0.5rem;
  }

  /* RESULTS */
  .results-section { padding: 0 0 4rem; display: none; }
  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 0;
    margin-bottom: 0.25rem;
  }

  .results-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .legend {
    display: flex;
    gap: 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

  /* PLAYER CARDS */
  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 1px;
  }

  .player-card {
    background: var(--bg2);
    padding: 1rem 1.1rem;
    cursor: default;
    transition: background 0.12s;
    position: relative;
  }
  .player-card:hover { background: var(--bg3); }

  .player-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .player-card.older::before { background: var(--older); }
  .player-card.younger::before { background: var(--younger); }
  .player-card.same::before { background: var(--same); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.35rem;
  }

  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.04em;
    color: var(--cream);
    line-height: 1;
  }

  .age-diff {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 0.2rem 0.45rem;
    border-radius: 3px;
    white-space: nowrap;
    line-height: 1;
  }
  .age-diff.older { background: rgba(196,146,90,0.15); color: var(--older); }
  .age-diff.younger { background: rgba(90,156,82,0.15); color: var(--younger); }
  .age-diff.same { background: rgba(107,127,138,0.15); color: var(--same); }

  .player-meta {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 0.2rem;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    border: 1px solid;
  }
  .badge-hof { border-color: rgba(196,146,90,0.5); color: rgba(196,146,90,0.9); }
  .badge-active { border-color: rgba(90,156,82,0.5); color: rgba(90,156,82,0.9); }
  .badge-manager { border-color: rgba(107,127,138,0.5); color: rgba(107,127,138,0.9); }
  .badge-legend { border-color: rgba(180,100,200,0.5); color: rgba(180,100,200,0.9); }

  .player-dob {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 3rem 0;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* SORT BAR */
  .sort-bar {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    margin-top: 0.75rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .sort-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-right: 0.25rem;
  }
  .sort-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.25rem 0.55rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .sort-btn.active { border-color: var(--green-light); color: var(--green-light); }
  .sort-btn:hover { color: var(--text); border-color: var(--border2); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  footer a { color: var(--green-light); text-decoration: none; }

  @media (max-width: 500px) {
    .player-grid { grid-template-columns: 1fr; }
    .dob-input { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="site-eyebrow">Major League Baseball</div>
    <h1 class="site-title">Older <span>&</span><br>Younger</h1>
    <p class="site-sub">See where you stand in baseball history</p>
  </header>

  <section class="input-section">
    <label class="dob-label" for="dob">Your date of birth</label>
    <div class="dob-row">
      <input type="date" id="dob" class="dob-input" max="2010-01-01">
      <button class="btn-compare" onclick="runComparison()">Compare</button>
    </div>
    <div class="age-display" id="age-display"></div>

    <div class="filters" id="filters">
      <div style="width:100%; text-align:center; margin-bottom:0.25rem;">
        <span style="font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-dim);">Filter by</span>
      </div>
      <button class="filter-btn active" data-cat="all" onclick="setCategory(this)">All</button>
      <button class="filter-btn" data-cat="active" onclick="setCategory(this)">Active Players</button>
      <button class="filter-btn" data-cat="retired" onclick="setCategory(this)">Retired Players</button>
      <button class="filter-btn" data-cat="hof" onclick="setCategory(this)">Hall of Fame</button>
      <button class="filter-btn" data-cat="manager" onclick="setCategory(this)">Managers</button>
      <button class="filter-btn" data-cat="legend" onclick="setCategory(this)">All-Time Legends</button>

      <div class="relation-toggle" style="width:100%; margin-top:0.5rem;">
        <button class="filter-btn active" data-rel="all" onclick="setRelation(this)">All</button>
        <button class="filter-btn" data-rel="older" onclick="setRelation(this)">Older than me</button>
        <button class="filter-btn" data-rel="younger" onclick="setRelation(this)">Younger than me</button>
      </div>
    </div>

    <div class="sort-bar" id="sort-bar" style="display:none;">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" data-sort="diff" onclick="setSort(this)">Age diff</button>
      <button class="sort-btn" data-sort="name" onclick="setSort(this)">Name</button>
      <button class="sort-btn" data-sort="dob" onclick="setSort(this)">Birth year</button>
    </div>
  </section>

  <section class="results-section" id="results-section">
    <div class="results-header">
      <span class="results-count" id="results-count"></span>
      <div class="legend">
        <span><span class="legend-dot" style="background:var(--older)"></span>Older</span>
        <span><span class="legend-dot" style="background:var(--younger)"></span>Younger</span>
        <span><span class="legend-dot" style="background:var(--same)"></span>Same year</span>
      </div>
    </div>
    <div class="player-grid" id="player-grid"></div>
    <div class="no-results" id="no-results" style="display:none;">No players match this filter.</div>
  </section>

  <footer>
    <p>Birth dates from public records &amp; Baseball Reference &mdash; <a href="https://github.com/" target="_blank">GitHub</a></p>
    <p style="margin-top:0.4rem; font-size:10px;">Active roster status as of 2025 season &mdash; data updated manually</p>
  </footer>
</div>

// ============================================================
// STATE
// ============================================================
let userDob = null;
let currentCat = "all";
let currentRel = "all";
let currentSort = "diff";

function daysBetween(d1, d2) {
  return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
}

function formatDiff(days) {
  const abs = Math.abs(days);
  const yrs = Math.floor(abs / 365.25);
  const rem = Math.floor((abs % 365.25) / 30.44);
  if (yrs === 0 && rem === 0) return "Same age";
  const parts = [];
  if (yrs > 0) parts.push(`${yrs}y`);
  if (rem > 0) parts.push(`${rem}m`);
  return parts.join(" ");
}

function formatDob(isoStr) {
  const d = new Date(isoStr + "T12:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function parseAge(dob) {
  const today = new Date();
  const b = new Date(dob + "T12:00:00");
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return age;
}

function runComparison() {
  const val = document.getElementById("dob").value;
  if (!val) return;
  userDob = new Date(val + "T12:00:00");
  const age = parseAge(val);
  document.getElementById("age-display").innerHTML = `You are <strong>${age} years old</strong>`;
  document.getElementById("filters").classList.add("visible");
  document.getElementById("sort-bar").style.display = "flex";
  renderResults();
}

function setCategory(btn) {
  document.querySelectorAll("[data-cat]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentCat = btn.dataset.cat;
  renderResults();
}

function setRelation(btn) {
  document.querySelectorAll("[data-rel]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentRel = btn.dataset.rel;
  renderResults();
}

function setSort(btn) {
  document.querySelectorAll("[data-sort]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentSort = btn.dataset.sort;
  renderResults();
}

function renderResults() {
  const section = document.getElementById("results-section");
  const grid = document.getElementById("player-grid");
  const noRes = document.getElementById("no-results");
  const count = document.getElementById("results-count");
  section.classList.add("visible");

  // Deduplicate by name
  const seen = new Set();
  let players = PLAYERS.filter(p => {
    if (seen.has(p.name)) return false;
    seen.add(p.name);
    return true;
  });

  // Filter by category
  if (currentCat !== "all") {
    players = players.filter(p => p.cats.includes(currentCat));
  }

  // Compute diff
  players = players.map(p => {
    const pd = new Date(p.dob + "T12:00:00");
    const diff = daysBetween(pd, userDob); // positive = player older than user
    return { ...p, diff, pd };
  });

  // Filter by relation
  if (currentRel === "older") players = players.filter(p => p.diff > 182);
  if (currentRel === "younger") players = players.filter(p => p.diff < -182);

  // Sort
  if (currentSort === "diff") {
    players.sort((a, b) => Math.abs(a.diff) - Math.abs(b.diff));
  } else if (currentSort === "name") {
    players.sort((a, b) => a.name.localeCompare(b.name));
  } else if (currentSort === "dob") {
    players.sort((a, b) => b.pd - a.pd);
  }

  if (players.length === 0) {
    grid.innerHTML = "";
    noRes.style.display = "block";
    count.textContent = "0 results";
    return;
  }

  noRes.style.display = "none";
  count.textContent = `${players.length} people`;

  grid.innerHTML = players.map(p => {
    const absDiff = Math.abs(p.diff);
    let relation, cls;
    if (absDiff < 183) { // within 6 months = same
      relation = "Same era";
      cls = "same";
    } else if (p.diff > 0) {
      relation = `${formatDiff(p.diff)} older`;
      cls = "older";
    } else {
      relation = `${formatDiff(p.diff)} younger`;
      cls = "younger";
    }

    const badges = p.cats.map(c => {
      const map = { active: ["badge-active", "Active"], hof: ["badge-hof", "HOF"], manager: ["badge-manager", "Mgr"], legend: ["badge-legend", "Legend"], retired: null };
      if (!map[c]) return "";
      return `<span class="badge ${map[c][0]}">${map[c][1]}</span>`;
    }).filter(Boolean).join(" ");

    return `<div class="player-card ${cls}">
      <div class="card-top">
        <div class="player-name">${p.name}</div>
        <div class="age-diff ${cls}">${relation}</div>
      </div>
      <div class="player-meta">
        <span>${p.pos}</span>
        <span style="opacity:0.5">·</span>
        <span>${p.team}</span>
        ${badges}
      </div>
      <div class="player-dob">${formatDob(p.dob)}</div>
    </div>`;
  }).join("");
}

// Allow Enter key
document.getElementById("dob").addEventListener("keydown", e => {
  if (e.key === "Enter") runComparison();
});
